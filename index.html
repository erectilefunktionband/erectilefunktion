<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Erectile Funktion</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#eaf0ff;background:radial-gradient(1100px 600px at 25% 0%,#ff4fd8 0,rgba(255,79,216,0) 60%),radial-gradient(900px 500px at 100% 40%,#41d9ff 0,rgba(65,217,255,0) 55%),linear-gradient(180deg,#070712,#14142b)}
a{color:inherit;text-decoration:none}
.wrap{max-width:1080px;margin:0 auto;padding:40px 20px}
.top{display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between}
h1{margin:0;font-size:28px;letter-spacing:.2px}
.tag{opacity:.8;margin:0;font-size:14px}
.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-top:22px}
@media (max-width:820px){.grid{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.12);border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.35);padding:18px}
.cardTitle{display:flex;gap:12px;align-items:center;margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:rgba(234,240,255,.85)}
.badge{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);padding:6px 10px;border-radius:999px}
.albumGrid{display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:12px}
@media (max-width:520px){.albumGrid{grid-template-columns:1fr}}
.albumCard{position:relative;border-radius:16px;overflow:hidden;min-height:240px;display:flex;flex-direction:column;justify-content:flex-end;background-size:cover;background-position:center;border:1px solid rgba(255,255,255,.18)}
.albumCard::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.10),rgba(0,0,0,.75))}
.albumCard>*{position:relative}
.albumMeta{padding:14px}
.albumName{margin:0;font-size:18px;font-weight:800;line-height:1.1}
.albumLinks{margin-top:12px;display:flex;flex-wrap:wrap;gap:10px}
.btn{display:inline-flex;align-items:center;gap:9px;border-radius:999px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.20);padding:10px 13px;font-weight:700;font-size:12px;letter-spacing:.03em;transition:.18s transform ease,.18s background ease,.18s border-color ease}
.btn:hover{transform:translateY(-1px);background:rgba(0,0,0,.48);border-color:rgba(255,255,255,.35)}
.socialList{display:flex;flex-direction:column;gap:12px;margin-top:14px}
.socialList .btn{justify-content:center;padding:12px 14px;font-size:13px}
.subtitle{opacity:.85;font-size:13px;margin-top:8px;margin-bottom:0}
</style>
</head>
<body>
<div class="wrap">
<div class="top">
<div>

<div class="albumMeta">
<p class="albumName">Pretty Good at Being Bad</p>
<div class="albumLinks">

<a class="btn" href="https://music.apple.com/us/album/pretty-good-at-being-bad/6776935343" target="_blank" rel="noreferrer noopener">Apple Music</a>

</div>
</div>

<div class="albumCard" style="background-image:url('funk-is-a-four-letter-word.jpeg')">

<div class="albumLinks">

<a class="btn" href="https://music.apple.com/us/artist/erectile-funktion/6776859697" target="_blank" rel="noreferrer noopener">Apple Music (artist)</a>
</div>
</div>
</div>

</div>
</div>

<div class="card">
<p class="cardTitle"><span class="badge">Follow</span> Stay updated</p>
<p class="subtitle">New releases, clips, and shows.</p>
<div class="socialList">
<a class="btn" href="https://www.instagram.com/erectilefunktionband/" target="_blank" rel="noreferrer noopener">Instagram</a>
<a class="btn" href="https://www.tiktok.com/@erectilefunktionband" target="_blank" rel="noreferrer noopener">TikTok</a>

</div>
</body>
</html>
