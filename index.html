<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Erectile Funktion</title>
<style>
body{margin:0;background:#05040b;color:#f5f5ff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
a{color:inherit;text-decoration:none}
.wrap{max-width:900px;margin:0 auto;padding:26px 18px}
h1{margin:0;font-size:30px}
.sub{margin:8px 0 18px;opacity:.85}
.grid{display:grid;grid-template-columns:1fr;gap:18px}
.card{border-radius:20px;border:1px solid #32324a;background:#0a0a18;overflow:hidden}
.card img{display:block;width:100%;height:auto}
.card h2{margin:12px 16px 0;font-size:20px}
.meta{margin:6px 16px 12px;opacity:.85}
.links{margin:10px 16px 16px;display:flex;flex-wrap:wrap;gap:10px}
.links a{padding:10px 14px;border-radius:999px;border:1px solid #3e3e5d;background:#0c0c1c;transition:background .15s,border-color .15s}
.links a:hover{background:#1a1a2f;border-color:#67679a}
@media (min-width: 900px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
<h1>Erectile Funktion</h1>
<p class="sub">indie funk • alt pop • philadelphia</p>

<div class="grid">
  <div class="card">
    <img src="pretty-good-at-being-bad.jpeg" alt="Pretty Good at Being Bad" loading="lazy" />
    <h2>Pretty Good at Being Bad</h2>
    <p class="meta">Album out now</p>
    <div class="links">
      <a href="SPOTIFY_ALBUM" target="_blank" rel="noreferrer noopener">Spotify</a>
      <a href="APPLE_ALBUM" target="_blank" rel="noreferrer noopener">Apple Music</a>
    </div>
  </div>

  <div class="card">
    <img src="funk-is-a-four-letter-word.jpeg" alt="Funk Is a Four-Letter Word" loading="lazy" />
    <h2>Funk Is a Four-Letter Word</h2>
    <p class="meta">Coming soon</p>
    <div class="links">
      <a href="SPOTIFY_ARTIST" target="_blank" rel="noreferrer noopener">Spotify artist</a>
      <a href="APPLE_ARTIST" target="_blank" rel="noreferrer noopener">Apple Music artist</a>
    </div>
  </div>

  <div class="card">
    <h2 style="margin:16px 16px 0;font-size:20px">Follow</h2>
    <p class="meta">Stay updated</p>
    <div class="links">
      <a href="INSTAGRAM" target="_blank" rel="noreferrer noopener">Instagram</a>
      <a href="TIKTOK" target="_blank" rel="noreferrer noopener">TikTok</a>
      <a href="SPOTIFY_ARTIST" target="_blank" rel="noreferrer noopener">Spotify</a>
    </div>
  </div>
</div>
</div>
</body>
</html>
