<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Erectile Funktion</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: auto;
      padding: 40px 20px;
    }
    .profile {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      background: #222;
    }
    h1 {
      margin: 0;
      font-size: 2.2rem;
    }
    .bio {
      opacity: 0.8;
      margin: 20px 0 35px;
      line-height: 1.4;
    }
    .button {
      display: block;
      text-decoration: none;
      color: white;
      background: #222;
      padding: 18px;
      margin: 12px 0;
      border-radius: 14px;
      font-weight: bold;
      transition: 0.2s;
    }
    .button:hover {
      background: #333;
      transform: translateY(-2px);
    }
    .album {
      margin-top: 40px;
      opacity: 0.7;
      font-size: 0.95rem;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <img
      class="profile"
      src="YOUR_BAND_PHOTO.jpg"
      alt="Erectile Funktion"
    />

    <h1>Erectile Funktion</h1>

    <p class="bio">
      🎸 Indie Funk • Alt Pop<br />
      New album: <strong>Pretty Good at Being Bad</strong>
    </p>

    <a
      class="button"
      href="https://open.spotify.com/album/3J0Q9ZA6dTXPvF6CbUL5dT"
      target="_blank"
      rel="noopener noreferrer"
    >
      🎵 Stream Pretty Good at Being Bad
    </a>

    <a
      class="button"
      href="https://open.spotify.com/artist/1eZ312FTyKapsUpXAsd8bi"
      target="_blank"
      rel="noopener noreferrer"
    >
      🎧 Spotify
    </a>

    <a
      class="button"
      href="https://music.apple.com/us/artist/erectile-funktion/6776859697"
      target="_blank"
      rel="noopener noreferrer"
    >
      🍎 Apple Music
    </a>

    <a
      class="button"
      href="https://www.instagram.com/erectilefunktionband/"
      target="_blank"
      rel="noopener noreferrer"
    >
      📸 Instagram
    </a>

    <a
      class="button"
      href="https://www.tiktok.com/@erectilefunktionband"
      target="_blank"
      rel="noopener noreferrer"
    >
      🎵 TikTok
    </a>

    <div class="album">
      Featuring:<br />
      Goldlight • Ballpark • Jackie • Brick by Brick • It Isn't Just a Pipe
      Dream
    </div>

    <div class="album" style="margin-top: 24px;">
      👉 Replace YOUR_BAND_PHOTO.jpg with your artwork photo.
    </div>
  </div>
</body>
</html>
