<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Erectile Funktion</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Inter, Arial, sans-serif;
    background: linear-gradient(180deg,#120c08,#050505);
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:24px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:4rem;
    font-weight:900;
    letter-spacing:-2px;
}

.header p{
    color:#d0d0d0;
    margin-top:8px;
}

.album{
    position:relative;
    overflow:hidden;
    border-radius:24px;
    margin-bottom:28px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
}

.album img{
    width:100%;
    display:block;
}

.overlay{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:30px;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.92),
        rgba(0,0,0,.45),
        transparent
    );
}

.overlay h2{
    font-size:2rem;
    margin-bottom:6px;
}

.overlay p{
    opacity:.9;
}

.button-row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:18px;
}

.button{
    text-decoration:none;
    color:white;
    padding:14px 20px;
    border-radius:999px;
    font-weight:700;
    transition:.2s;
}

.spotify{
    background:#1DB954;
}

.apple{
    background:#fc3c44;
}

.coming{
    background:#555;
}

.button:hover{
    transform:translateY(-2px);
    filter:brightness(1.08);
}

.socials{
    background:#111;
    border-radius:24px;
    padding:30px;
    text-align:center;
    margin-top:20px;
}

.socials h3{
    margin-bottom:18px;
    font-size:1.7rem;
}

.social-buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
}

.social-buttons a{
    text-decoration:none;
    color:white;
    background:#222;
    padding:14px 20px;
    border-radius:999px;
    font-weight:700;
    transition:.2s;
}

.social-buttons a:hover{
    background:#333;
}

.footer{
    text-align:center;
    opacity:.6;
    margin-top:30px;
    padding-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Erectile Funktion</h1>
        <p>Indie Funk • Alt Pop • Philadelphia</p>
    </div>

    <div class="album">
        <img src="pretty-good-at-being-bad.jpeg" alt="Pretty Good at Being Bad">

        <div class="overlay">
            <h2>Pretty Good at Being Bad</h2>
            <p>Out Now</p>

            <div class="button-row">
                <a class="button spotify"
                   href="https://open.spotify.com/album/3J0Q9ZA6dTXPvF6CbUL5dT?si=gnA9bsa0RHSvCShJL9mUbg"
                   target="_blank">
                   Spotify
                </a>

                <a class="button apple"
                   href="https://music.apple.com/us/artist/erectile-funktion/6776859697"
                   target="_blank">
                   Apple Music
                </a>
            </div>
        </div>
    </div>

    <div class="album">
        <img src="funk-is-a-four-letter-word.jpeg" alt="Funk Is a Four Letter Word">

        <div class="overlay">
            <h2>Funk Is a Four Letter Word</h2>
            <p>Coming Soon</p>

            <div class="button-row">
                <a class="button coming"
                   href="https://open.spotify.com/artist/1eZ312FTyKapsUpXAsd8bi?si=8yMc2LOuQoOz6mlechJI5g"
                   target="_blank">
                   Follow on Spotify
                </a>
            </div>
        </div>
    </div>

    <div class="socials">

        <h3>Follow the Band</h3>

        <div class="social-buttons">

            <a href="https://www.instagram.com/erectilefunktionband/"
               target="_blank">
               Instagram
            </a>

            <a href="https://www.tiktok.com/@erectilefunktionband"
               target="_blank">
               TikTok
            </a>

            <a href="https://open.spotify.com/artist/1eZ312FTyKapsUpXAsd8bi?si=8yMc2LOuQoOz6mlechJI5g"
               target="_blank">
               Spotify
            </a>

            <a href="https://music.apple.com/us/artist/erectile-funktion/6776859697"
               target="_blank">
               Apple Music
            </a>

        </div>

    </div>

    <div class="footer">
        © Erectile Funktion
    </div>

</div>

</body>
</html>
